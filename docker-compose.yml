version: "3.8"

services:
  aitoutiao-engine:
    build: .
    container_name: aitoutiao-engine
    ports:
      - "8502:8502"
    volumes:
      # 持久化产出目录
      - ./outputs:/app/outputs
      - ./log:/app/log
      # 模型文件（避免每次重建下载）
      - model_cache:/root/.cache/modelscope
    env_file:
      - .env
    environment:
      - PIPELINE_OUTPUT_DIR=/app/outputs
      - STREAMLIT_SERVER_PORT=8502
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    # GPU 直通（按需取消注释）：
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  model_cache:
